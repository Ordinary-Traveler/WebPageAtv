<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatos - S.O.S Mulher</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/relatos.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <script src="../assets/js/include.js" defer></script>
</head>
<body>
    <div data-include="../components/header.html"></div>

    <main class="main-content">
        <section class="sessao-envio">
            <div class="introducao-relatos">
                <h1>Relatos de Superação</h1>
                <p>Seu depoimento pode ser a força que outra mulher precisa para romper o ciclo. O envio é totalmente anônimo.</p>
            </div>

            <div class="formulario-box">
                <h3>Compartilhe sua história</h3>
                <form id="formRelato"> <div class="input-grupo">
                        <input type="text" placeholder="Nome ou Apelido (Opcional)" id="nome">
                        <input type="text" placeholder="Sua Idade (Opcional)" id="idade">
                    </div>
                    
                    <textarea id="texto" placeholder="Escreva seu relato aqui... Fique à vontade para contar sua história de superação." required></textarea>
                    
                    <div class="form-footer">
                        <p class="aviso-privacidade">🔒 Seu relato passará por uma moderação antes de ser publicado para garantir a segurança de todas.</p>
                        <button type="submit" class="btn-enviar">Publicar Relato</button>
                    </div>
                </form>
            </div>
        </section>

        <div id="lista-relatos" class="relatos-grid"></div>
    </main>

    <div data-include="../components/footer.html"></div>

    <a href="https://www.sephora.com.br" class="btn-saida-rapida" title="Sair rapidamente">SAÍDA RÁPIDA</a>

    <script src="../assets/js/relatos.js" defer></script>
</body>
</html>
