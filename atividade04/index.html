<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="wrapper">
    <div class="container">
      <p class="voltar">← Voltar</p>
      <h1>Compras da semana</h1>

      <div class="input-group">
        <input type="text" id="inputItem" placeholder="Adicione um novo item">
        <button id="btnAdd">Adicionar item</button>
      </div>

      <ul id="lista"></ul>

      <div id="toast" class="toast">
        <span>⚠ O item foi removido da lista</span>
        <span onclick="fecharToast()">✕</span>
      </div>
    </div>
  </div>

  <script src="assets/js/java.js"></script>
</body>
</html>
